name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install CocoaPods
        run: |
          cd src
          pod install
          
      - name: Build IPA
        run: |
          cd src
          xcodebuild -workspace VesselX.xcworkspace -scheme VesselX -configuration Release archive -archivePath build/VesselX.xcarchive
          mkdir -p build/Payload
          cp -r build/VesselX.xcarchive/Products/Applications/VesselX.app build/Payload/
          cd build && zip -r VesselX.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VesselX.ipa
          path: src/build/VesselX.ipa